<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=rose" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GeToken — 高速聚合中转站。一个入口聚合 Claude Code、GPT、Gemini 三类上游,统一计费、可观测、按需路由。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>GeToken — 高速聚合中转站</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('getoken.theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved ? saved === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
          var savedAccent = localStorage.getItem('getoken.theme-accent');
          var manualAccent = localStorage.getItem('getoken.theme-accent-manual') === 'true';
          var allowed = { brand: true, cyan: true, indigo: true, violet: true, rose: true, slate: true };
          document.documentElement.dataset.accent = allowed[savedAccent] && (savedAccent !== 'brand' || manualAccent) ? savedAccent : 'rose';
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
